<div class="auth-container">
  <div class="auth-background">
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>
  </div>

  <div class="auth-content">
    <div class="auth-brand">
      <img
        class="brand-logo"
        src="/assets/images/detailly-logo-transparent.png"
        alt="Detailly"
      />
    </div>

    <mat-card class="auth-card">
      <mat-card-content>
        <div class="auth-card__header">
          <h1 class="auth-title">Welcome Back</h1>
          <p class="auth-subtitle">Sign in to manage your bookings and orders</p>
        </div>

        <div *ngIf="errorMessage" class="error-message" @fadeIn>
          <mat-icon>error_outline</mat-icon>
          <span>{{ errorMessage }}</span>
        </div>

        <form [formGroup]="form" (ngSubmit)="onSubmit()">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Email</mat-label>
            <input
              matInput
              formControlName="email"
              type="email"
              placeholder="john@example.com"
              autocomplete="email"
            />
            <mat-icon matPrefix>mail</mat-icon>
            <mat-error *ngIf="form.get('email')?.hasError('required')">
              Email is required
            </mat-error>
            <mat-error *ngIf="form.get('email')?.hasError('email')">
              Enter a valid email
            </mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Password</mat-label>
            <input
              matInput
              formControlName="password"
              [type]="hidePassword ? 'password' : 'text'"
              placeholder="Password"
              autocomplete="current-password"
            />
            <mat-icon matPrefix>lock</mat-icon>
            <button
              mat-icon-button
              matSuffix
              type="button"
              (click)="hidePassword = !hidePassword"
              [attr.aria-label]="'Toggle password visibility'"
            >
              <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
            <mat-error *ngIf="form.get('password')?.hasError('required')">
              Password is required
            </mat-error>
          </mat-form-field>

          <div class="form-row">
            <mat-checkbox formControlName="rememberMe" color="primary">
              {{ 'AUTH.LOGIN.REMEMBER_ME' | translate }}
            </mat-checkbox>
            <a routerLink="/auth/forgot-password" class="forgot-link">Forgot password?</a>
          </div>

          <div class="actions">
            <button
              mat-raised-button
              color="primary"
              type="submit"
              class="submit-button"
              [disabled]="form.invalid || isLoading"
            >
              <ng-container *ngIf="!isLoading; else loadingTpl">
                {{ 'AUTH.LOGIN.BUTTON' | translate }}
                <mat-icon>arrow_forward</mat-icon>
              </ng-container>
              <ng-template #loadingTpl>
                <mat-progress-spinner
                  mode="indeterminate"
                  diameter="20"
                  strokeWidth="3"
                ></mat-progress-spinner>
                <span>Signing in...</span>
              </ng-template>
            </button>
          </div>

          <div class="divider">
            <span>or</span>
          </div>

          <div class="register-prompt">
            <span>Don't have an account?</span>
            <a routerLink="/auth/register" class="register-link">Sign up</a>
          </div>
        </form>
      </mat-card-content>
    </mat-card>

    <div class="auth-footer">
      <a routerLink="/" class="back-link">
        <mat-icon>arrow_back</mat-icon>
        Back to home
      </a>
    </div>
  </div>
</div>
