<div class="auth-container">
  <div class="auth-background">
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>
  </div>

  <div class="auth-content">
    <div class="auth-brand">
      <img
        class="brand-logo"
        src="/assets/images/detailly-logo-transparent.png"
        alt="Detailly"
      />
    </div>

    <mat-card class="auth-card">
      <mat-card-content>
        <div class="auth-card__header">
          <h1 class="auth-title">Welcome Back</h1>
          <p class="auth-subtitle">Sign in to manage your bookings and orders</p>
        </div>

        <div *ngIf="errorMessage" class="error-message" @fadeIn>
          <mat-icon>error_outline</mat-icon>
          <span>{{ errorMessage }}</span>
        </div>

        <form [formGroup]="form" (ngSubmit)="onSubmit()">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Email</mat-label>
            <input
              matInput
              formControlName="email"
              type="email"
              placeholder="john@example.com"
              autocomplete="email"
            />
            <mat-icon matPrefix>mail</mat-icon>
            <mat-error *ngIf="form.get('email')?.hasError('required')">
              Email is required
            </mat-error>
            <mat-error *ngIf="form.get('email')?.hasError('email')">
              Enter a valid email
            </mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Password</mat-label>
            <input
              matInput
              formControlName="password"
              [type]="hidePassword ? 'password' : 'text'"
              placeholder="Password"
              autocomplete="current-password"
            />
            <mat-icon matPrefix>lock</mat-icon>
            <button
              mat-icon-button
              matSuffix
              type="button"
              (click)="hidePassword = !hidePassword"
              [attr.aria-label]="'Toggle password visibility'"
            >
              <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
            <mat-error *ngIf="form.get('password')?.hasError('required')">
              Password is required
            </mat-error>
          </mat-form-field>

          <div class="form-row">
            <mat-checkbox formControlName="rememberMe" color="primary">
              {{ 'AUTH.LOGIN.REMEMBER_ME' | translate }}
            </mat-checkbox>
            <a routerLink="/auth/forgot-password" class="forgot-link">Forgot password?</a>
          </div>

          <div class="actions">
            <button
              mat-raised-button
              color="primary"
              type="submit"
              class="submit-button"
              [disabled]="form.invalid || isLoading"
            >
              <ng-container *ngIf="!isLoading; else loadingTpl">
                {{ 'AUTH.LOGIN.BUTTON' | translate }}
                <mat-icon>arrow_forward</mat-icon>
              </ng-container>
              <ng-template #loadingTpl>
                <mat-progress-spinner
                  mode="indeterminate"
                  diameter="20"
                  strokeWidth="3"
                ></mat-progress-spinner>
                <span>Signing in...</span>
              </ng-template>
            </button>
          </div>

          <div class="divider">
            <span>or</span>
          </div>

          <button
            type="button"
            class="google-button"
            (click)="loginWithGoogle()"
          >
            <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Continue with Google
          </button>

          <div class="register-prompt">
            <span>Don't have an account?</span>
            <a routerLink="/auth/register" class="register-link">Sign up</a>
          </div>
        </form>
      </mat-card-content>
    </mat-card>

    <div class="auth-footer">
      <a routerLink="/" class="back-link">
        <mat-icon>arrow_back</mat-icon>
        Back to home
      </a>
    </div>
  </div>
</div>
