<nav class="site-navbar">
  <div class="site-navbar__container">
    <div class="site-navbar__surface">
      <a class="site-navbar__brand" routerLink="/" aria-label="Detailly home">
        <img
          class="site-navbar__logo"
          src="/assets/images/detailly-logo-transparent.png"
          alt="Detailly"
        />
      </a>

      <div class="site-navbar__links">
        <a
          *ngFor="let link of navLinks"
          [routerLink]="resolveRoute(link)"
          class="site-navbar__link"
          [class.site-navbar__link--active]="isLinkActive(link)"
          [attr.aria-current]="isLinkActive(link) ? 'page' : null"
        >
          {{ link.label }}
        </a>
      </div>

      <div class="site-navbar__actions">
        <div *ngIf="isAdmin() || isManager() || isEmployee()" class="site-navbar__badge">
          <app-badge variant="default">
            <span class="site-navbar__role">
              <mat-icon>admin_panel_settings</mat-icon>
              {{ getRoleLabel() }} Mode
            </span>
          </app-badge>
        </div>

        <a
          routerLink="/search"
          class="site-navbar__icon-button site-navbar__icon-button--desktop"
          [class.site-navbar__icon-button--active]="isShopActive()"
          aria-label="Open shop"
        >
          <mat-icon>shopping_cart</mat-icon>
        </a>

        <a
          [routerLink]="getAccountRoute()"
          class="site-navbar__icon-button site-navbar__icon-button--desktop"
          [class.site-navbar__icon-button--active]="isAccountActive()"
          aria-label="Open account"
        >
          <mat-icon>person</mat-icon>
        </a>

        <button
          *ngIf="isAuthenticated()"
          type="button"
          class="site-navbar__icon-button site-navbar__icon-button--desktop site-navbar__icon-button--logout"
          (click)="logout()"
          aria-label="Sign out"
        >
          <mat-icon>logout</mat-icon>
        </button>

        <button
          type="button"
          class="site-navbar__icon-button site-navbar__mobile-toggle"
          (click)="toggleMobileMenu()"
          [attr.aria-expanded]="isMenuOpen"
          aria-label="Toggle navigation menu"
        >
          <mat-icon>{{ isMenuOpen ? 'close' : 'menu' }}</mat-icon>
        </button>
      </div>
    </div>
  </div>

  <div class="site-mobile-menu" [class.site-mobile-menu--open]="isMenuOpen">
    <div class="site-mobile-menu__container">
      <div class="site-mobile-menu__panel">
        <a
          *ngFor="let link of navLinks"
          [routerLink]="resolveRoute(link)"
          class="site-mobile-menu__link"
          [class.site-mobile-menu__link--active]="isLinkActive(link)"
          (click)="closeMobileMenu()"
        >
          <mat-icon>{{ link.icon }}</mat-icon>
          <span>{{ link.label }}</span>
        </a>

        <div *ngIf="isAdmin() || isManager() || isEmployee()" class="site-mobile-menu__role">
          <app-badge variant="default">
            <span class="site-navbar__role">
              <mat-icon>admin_panel_settings</mat-icon>
              {{ getRoleLabel() }} Mode
            </span>
          </app-badge>
        </div>

        <div class="site-mobile-menu__actions">
          <a routerLink="/search" class="site-mobile-menu__action" (click)="closeMobileMenu()">
            <mat-icon>shopping_cart</mat-icon>
            <span>Shop Products</span>
          </a>

          <a
            [routerLink]="getAccountRoute()"
            class="site-mobile-menu__action"
            (click)="closeMobileMenu()"
          >
            <mat-icon>person</mat-icon>
            <span>{{ isAuthenticated() ? 'My Account' : 'Sign In' }}</span>
          </a>

          <button
            *ngIf="isAuthenticated()"
            type="button"
            class="site-mobile-menu__action"
            (click)="logout()"
          >
            <mat-icon>logout</mat-icon>
            <span>Sign Out</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</nav>
