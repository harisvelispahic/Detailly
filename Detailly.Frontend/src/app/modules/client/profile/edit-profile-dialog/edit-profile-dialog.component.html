<div class="epd">
  <div class="epd__header">
    <div class="epd__title-row">
      <mat-icon class="epd__icon">person</mat-icon>
      <h2 class="epd__title">Edit Profile</h2>
    </div>
    <button mat-icon-button (click)="cancel()"><mat-icon>close</mat-icon></button>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="epd__form">
    <div class="epd__row">
      <mat-form-field appearance="outline" subscriptSizing="fixed">
        <mat-label>First Name</mat-label>
        <input matInput formControlName="firstName" />
        <mat-error *ngIf="form.get('firstName')?.hasError('required')">Required</mat-error>
        <mat-error *ngIf="form.get('firstName')?.hasError('maxlength')">Too long</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" subscriptSizing="fixed">
        <mat-label>Last Name</mat-label>
        <input matInput formControlName="lastName" />
        <mat-error *ngIf="form.get('lastName')?.hasError('required')">Required</mat-error>
        <mat-error *ngIf="form.get('lastName')?.hasError('maxlength')">Too long</mat-error>
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" subscriptSizing="fixed" class="epd__full">
      <mat-label>Username</mat-label>
      <input matInput formControlName="username" />
      <mat-error *ngIf="form.get('username')?.hasError('required')">Required</mat-error>
      <mat-error *ngIf="form.get('username')?.hasError('minlength')"
        >At least 3 characters</mat-error
      >
      <mat-error *ngIf="form.get('username')?.hasError('maxlength')">Too long</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" subscriptSizing="dynamic" class="epd__full">
      <mat-label>Email</mat-label>
      <input matInput type="email" formControlName="email" />
      <span *ngIf="isOAuth" matSuffix class="epd__oauth-suffix">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Google
      </span>
      <mat-hint *ngIf="isOAuth">Managed by Google — cannot be changed</mat-hint>
      <mat-error *ngIf="!isOAuth && form.get('email')?.hasError('required')">Required</mat-error>
      <mat-error *ngIf="!isOAuth && form.get('email')?.hasError('email')">Enter a valid email</mat-error>
    </mat-form-field>

    <!-- Phone -->
    <div class="epd__phone-group">
      <mat-form-field appearance="outline" subscriptSizing="fixed" class="epd__phone-country">
        <span matPrefix class="fi fi-{{ selectedCountry.iso2 }} epd__flag-prefix"></span>
        <input
          matInput
          [formControl]="countrySearchCtrl"
          [matAutocomplete]="phoneCountryAuto"
          (focus)="onCountryFocus()"
          (blur)="onCountryBlur()"
          aria-label="Country dial code"
        />
        <mat-autocomplete
          #phoneCountryAuto="matAutocomplete"
          [displayWith]="displayCountry"
          (optionSelected)="onCountrySelected($event)"
          panelClass="epd-country-panel"
        >
          <mat-option *ngFor="let c of filteredCountries" [value]="c">
            <span class="fi fi-{{ c.iso2 }} epd__option-flag"></span>
            <span class="epd__option-dial">+{{ c.dialCode }}</span>
          </mat-option>
        </mat-autocomplete>
      </mat-form-field>

      <mat-form-field appearance="outline" subscriptSizing="fixed" class="epd__phone-number">
        <mat-label>Phone (optional)</mat-label>
        <input
          matInput
          type="tel"
          inputmode="numeric"
          [value]="phoneDisplay"
          (input)="onPhoneInput($event)"
          placeholder="60 555 33 33"
        />
        <mat-icon matPrefix>phone</mat-icon>
      </mat-form-field>
    </div>

    <mat-form-field *ngIf="isFleet" appearance="outline" subscriptSizing="fixed" class="epd__full">
      <mat-label>Company Name</mat-label>
      <input matInput formControlName="companyName" />
    </mat-form-field>

    <div *ngIf="error" class="epd__error">{{ error }}</div>

    <div class="epd__actions">
      <button type="button" mat-stroked-button (click)="cancel()">Cancel</button>
      <button
        type="submit"
        mat-raised-button
        color="primary"
        [disabled]="form.invalid || isLoading"
      >
        <mat-spinner *ngIf="isLoading" diameter="18"></mat-spinner>
        <span>Save Changes</span>
      </button>
    </div>
  </form>
</div>
