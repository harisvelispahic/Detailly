<div class="ad">
  <div class="ad__header">
    <div class="ad__title-row">
      <mat-icon class="ad__icon">location_on</mat-icon>
      <h2 class="ad__title">{{ isEdit ? 'Edit Address' : 'Add Address' }}</h2>
    </div>
    <button mat-icon-button (click)="cancel()" class="ad__close-btn">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="ad__form">
    <mat-form-field appearance="outline" class="ad__field">
      <mat-label>Street</mat-label>
      <input matInput formControlName="street" placeholder="e.g. 123 Main St" />
    </mat-form-field>

    <div class="ad__row">
      <mat-form-field appearance="outline" class="ad__field">
        <mat-label>City</mat-label>
        <input matInput formControlName="city" placeholder="e.g. Sarajevo" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="ad__field">
        <mat-label>Postal Code</mat-label>
        <input matInput formControlName="postalCode" placeholder="e.g. 71000" />
      </mat-form-field>
    </div>

    <div class="ad__row">
      <mat-form-field appearance="outline" class="ad__field">
        <mat-label>Region (optional)</mat-label>
        <input matInput formControlName="region" placeholder="e.g. Federation" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="ad__field">
        <mat-label>Country</mat-label>
        <input matInput formControlName="country" placeholder="e.g. Bosnia and Herzegovina" />
      </mat-form-field>
    </div>

    <div *ngIf="error" class="ad__error">{{ error }}</div>

    <div class="ad__actions">
      <button type="button" mat-stroked-button (click)="cancel()">Cancel</button>
      <button
        type="submit"
        mat-raised-button
        color="primary"
        [disabled]="form.invalid || isLoading"
      >
        <mat-spinner *ngIf="isLoading" diameter="18"></mat-spinner>
        <span>{{ isEdit ? 'Save Changes' : 'Add Address' }}</span>
      </button>
    </div>
  </form>
</div>
