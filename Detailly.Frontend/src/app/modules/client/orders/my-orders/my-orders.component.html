<div class="box">
  <h2 class="title is-4">My Orders</h2>

  @if (isLoading) {
    <div>Loading...</div>
  }

  @if (error) {
    <div class="notification is-danger">
      {{ error }}
    </div>
  }

  @if (!isLoading) {
    <table class="table is-fullwidth is-striped">
      <thead>
        <tr>
          <th>#</th>
          <th>Date</th>
          <th>Total</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>

      <tbody>
        @for (o of items; track o.id) {
          <tr>
            <td>{{ o.orderNumber ?? o.id }}</td>
            <td>{{ o.orderDate }}</td>
            <td>{{ o.totalAmount }}</td>
            <td>{{ o.status }}</td>
            <td>
              <button class="button is-small" (click)="open(o.id)">Details</button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  }

  <div class="buttons mt-3">
    <button class="button" (click)="prev()" [disabled]="page <= 1">Prev</button>
    <button class="button" (click)="next()" [disabled]="page * pageSize >= total">Next</button>
  </div>

  <p class="has-text-grey mt-2">Showing page {{ page }} — total {{ total }}</p>
</div>
