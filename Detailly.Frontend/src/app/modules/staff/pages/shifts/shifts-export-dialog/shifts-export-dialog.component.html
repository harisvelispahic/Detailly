<div class="export-dialog">
  <h2 mat-dialog-title class="export-dialog__title">
    <mat-icon class="export-dialog__title-icon">picture_as_pdf</mat-icon>
    Export Shifts Report
  </h2>

  <mat-dialog-content class="export-dialog__content">
    <p class="export-dialog__desc">
      Generate a PDF report of employee shifts for
      <strong>{{ locationName }}</strong
      >.
    </p>

    <div class="export-dialog__fields">
      <mat-form-field appearance="outline" class="export-dialog__field">
        <mat-label>From</mat-label>
        <input
          matInput
          [matDatepicker]="startPicker"
          [(ngModel)]="startDate"
          placeholder="DD/MM/YYYY"
        />
        <mat-datepicker-toggle matIconSuffix [for]="startPicker"></mat-datepicker-toggle>
        <mat-datepicker #startPicker></mat-datepicker>
      </mat-form-field>

      <mat-form-field appearance="outline" class="export-dialog__field">
        <mat-label>To</mat-label>
        <input
          matInput
          [matDatepicker]="endPicker"
          [(ngModel)]="endDate"
          [min]="startDate"
          placeholder="DD/MM/YYYY"
        />
        <mat-datepicker-toggle matIconSuffix [for]="endPicker"></mat-datepicker-toggle>
        <mat-datepicker #endPicker></mat-datepicker>
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="export-dialog__field export-dialog__field--full">
      <mat-label>Work Mode</mat-label>
      <mat-select [(ngModel)]="workModeFilter">
        <mat-option [value]="null">All modes</mat-option>
        <mat-option [value]="EmployeeWorkMode.InShop">In Shop</mat-option>
        <mat-option [value]="EmployeeWorkMode.Mobile">Mobile</mat-option>
      </mat-select>
    </mat-form-field>

    @if (startDate && endDate && startDate > endDate) {
      <p class="export-dialog__error">End date must be after start date.</p>
    }
  </mat-dialog-content>

  <mat-dialog-actions class="export-dialog__actions">
    <button mat-stroked-button (click)="cancel()" [disabled]="isExporting">Cancel</button>
    <button
      mat-raised-button
      color="primary"
      [disabled]="!isValid || isExporting"
      (click)="export()"
    >
      @if (isExporting) {
        <mat-spinner diameter="18" class="export-dialog__spinner"></mat-spinner>
        Generating…
      } @else {
        <ng-container>
          <mat-icon>download</mat-icon>
          Generate PDF
        </ng-container>
      }
    </button>
  </mat-dialog-actions>
</div>
