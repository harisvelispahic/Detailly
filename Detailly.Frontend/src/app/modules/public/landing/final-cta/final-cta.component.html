<section class="final-cta-section">
  <div class="container">
    <div class="cta-card">
      <!-- Background gradients -->
      <div class="card-background">
        <div class="gradient-overlay"></div>
      </div>

      <!-- Content -->
      <div class="cta-content">
        <h2 class="cta-title">
          Ready for a
          <span class="gradient-text">Transformation?</span>
        </h2>
        <p class="cta-description">
          Book your detailing appointment today and experience the Detailly difference.
        </p>

        <div class="cta-actions">
          <button mat-raised-button color="primary" class="primary-cta btn-trailing-icon" (click)="bookNow()">
            <span class="btn-trailing-icon__text">Book Now</span>
            <mat-icon>arrow_forward</mat-icon>
          </button>
          <button mat-stroked-button class="secondary-cta btn-trailing-icon" (click)="exploreProducts()">
            <span class="btn-trailing-icon__text">Explore Products</span>
            <mat-icon>shopping_cart</mat-icon>
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
