<section class="services-section">
  <div class="container">
    <!-- Section Header -->
    <div class="section-header">
      <h2 class="section-title">
        Our
        <span class="gradient-text">Services</span>
      </h2>
      <p class="section-subtitle">
        From quick washes to complete transformations, we've got you covered.
      </p>
    </div>

    <!-- Services Grid -->
    <div class="services-grid">
      <div
        *ngFor="let service of services; let i = index"
        class="service-card"
        [style.animation-delay]="i * 100 + 'ms'"
      >
        <!-- Service Image -->
        <div class="service-image">
          <img [src]="service.image" [alt]="service.name" />
          @if (service.popular) {
            <div class="popular-badge">
              <mat-icon>star</mat-icon>
              <span>Popular</span>
            </div>
          }
        </div>

        <!-- Service Content -->
        <div class="service-content">
          <div class="service-header">
            <h3 class="service-name">{{ service.name }}</h3>
            <span class="service-price">${{ service.price }}</span>
          </div>

          <p class="service-description">{{ service.description }}</p>

          <div class="service-duration">
            <mat-icon>schedule</mat-icon>
            <span>{{ service.duration }}</span>
          </div>
        </div>
      </div>
    </div>

    <!-- View All Button -->
    <div class="actions-container">
      <button
        mat-raised-button
        color="primary"
        class="view-all-btn btn-trailing-icon"
        (click)="viewAllServices()"
      >
        <span class="btn-trailing-icon__text">View All Services</span>
        <mat-icon>arrow_forward</mat-icon>
      </button>
    </div>
  </div>
</section>
