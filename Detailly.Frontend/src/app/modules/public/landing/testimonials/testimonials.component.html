<section class="testimonials-section">
  <div class="container">
    <!-- Section Header -->
    <div class="section-header">
      <h2 class="section-title">
        What Our Customers
        <span class="gradient-text">Say</span>
      </h2>
      <p class="section-subtitle">
        Don't just take our word for it — hear from our satisfied customers.
      </p>
    </div>

    <!-- Testimonial Carousel -->
    <div class="testimonial-carousel">
      <!-- Current Review Card -->
      <div *ngIf="currentReview" class="review-card">
        <!-- Star Rating -->
        <div class="star-rating">
          <mat-icon
            *ngFor="let star of getRatingArray(currentReview.rating)"
            [class.filled]="star < currentReview.rating"
          >
            star
          </mat-icon>
        </div>

        <!-- Review Text -->
        <p class="review-text">"{{ currentReview.comment }}"</p>

        <!-- Reviewer Info -->
        <div class="reviewer-info">
          <img
            [src]="currentReview.userAvatar"
            [alt]="currentReview.userName"
            class="reviewer-avatar"
          />
          <div class="reviewer-details">
            <div class="reviewer-name">{{ currentReview.userName }}</div>
            <div class="reviewer-service">{{ currentReview.serviceName }}</div>
          </div>
        </div>
      </div>

      <!-- Navigation Controls -->
      <div class="carousel-controls">
        <!-- Previous Button -->
        <button
          mat-icon-button
          class="nav-button"
          (click)="prevReview()"
          [disabled]="reviews.length <= 1"
        >
          <mat-icon>chevron_left</mat-icon>
        </button>

        <!-- Dot Indicators -->
        <div class="dot-indicators">
          <button
            *ngFor="let review of reviews; let i = index"
            class="dot"
            [class.active]="i === currentReviewIndex"
            (click)="goToReview(i)"
            [attr.aria-label]="'Go to review ' + (i + 1)"
          ></button>
        </div>

        <!-- Next Button -->
        <button
          mat-icon-button
          class="nav-button"
          (click)="nextReview()"
          [disabled]="reviews.length <= 1"
        >
          <mat-icon>chevron_right</mat-icon>
        </button>
      </div>
    </div>
  </div>
</section>
