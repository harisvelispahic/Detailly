<section class="public-placeholder-page">
  <div class="public-placeholder-page__backdrop"></div>

  <app-container size="xl">
    <div class="public-placeholder-page__grid">
      <div class="public-placeholder-page__content">
        <span *ngIf="page.eyebrow" class="public-placeholder-page__eyebrow">{{ page.eyebrow }}</span>

        <h1 class="public-placeholder-page__title">
          {{ page.title }}
          <span *ngIf="page.accent" class="gradient-text">{{ page.accent }}</span>
        </h1>

        <p class="public-placeholder-page__description">{{ page.description }}</p>

        <div class="public-placeholder-page__actions">
          <a
            *ngIf="page.primaryLabel && page.primaryRoute"
            mat-raised-button
            color="primary"
            [routerLink]="page.primaryRoute"
          >
            {{ page.primaryLabel }}
            <mat-icon>arrow_forward</mat-icon>
          </a>

          <a
            *ngIf="page.secondaryLabel && page.secondaryRoute"
            mat-stroked-button
            [routerLink]="page.secondaryRoute"
          >
            {{ page.secondaryLabel }}
          </a>
        </div>
      </div>

      <app-card variant="glass" class="public-placeholder-page__card">
        <app-card-header>
          <app-card-title>Planned Scope</app-card-title>
          <app-card-description>
            This route is now connected so navigation and footer links land on a real screen.
          </app-card-description>
        </app-card-header>

        <app-card-content>
          <ul *ngIf="page.highlights?.length" class="public-placeholder-page__list">
            <li *ngFor="let item of page.highlights">
              <mat-icon>check_circle</mat-icon>
              <span>{{ item }}</span>
            </li>
          </ul>
        </app-card-content>
      </app-card>
    </div>
  </app-container>
</section>
